[tasks.setup]
description = "Set up chezmoi config and source directory"
run = """
#!/usr/bin/env bash
set -euo pipefail

REPO_DIR="${MISE_PROJECT_ROOT:?}"
CONFIG_DIR="${HOME}/.config/chezmoi"
CONFIG_FILE="${CONFIG_DIR}/chezmoi.toml"

echo "=== Chezmoi Setup ==="
echo

# Session type
echo "Session type:"
echo "  1) wayland (niri)"
echo "  2) x11 (i3)"
echo "  3) kodi"
read -rp "Choose [1]: " session_choice
case "${session_choice:-1}" in
  1) session="wayland" ;;
  2) session="x11" ;;
  3) session="kodi" ;;
  *) echo "Invalid choice"; exit 1 ;;
esac

# Role (i3 profile)
echo
echo "Role:"
echo "  1) desktop"
echo "  2) kodi"
echo "  3) retro-laptop"
read -rp "Choose [1]: " role_choice
case "${role_choice:-1}" in
  1) role="desktop" ;;
  2) role="kodi" ;;
  3) role="retro-laptop" ;;
  *) echo "Invalid choice"; exit 1 ;;
esac

# Write chezmoi config
mkdir -p "${CONFIG_DIR}"
cat > "${CONFIG_FILE}" <<EOF
sourceDir = "${REPO_DIR}"

[data]
  session = "${session}"
  role = "${role}"
EOF

echo
echo "Wrote ${CONFIG_FILE}:"
cat "${CONFIG_FILE}"
echo
echo "Run 'chezmoi apply' to apply dotfiles."
"""
