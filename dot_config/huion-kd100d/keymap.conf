# Huion KD100 keydial bindings — read by huion-kd100d at startup.
# Format:  <target> = KEY_A+KEY_B     (chord held while the button is held)
#   target = daemon key number 1..19, or dial_cw / dial_ccw.
#   Key names: KEY_* from github.com/bendahl/uinput (see keyByName in main.go).
# Restart after editing:  systemctl --user restart huion-kd100d
#
# Note: daemon key N corresponds to the physical button labelled N+1 on this
# unit (the decode is off by one from the silkscreen). Numbers below are the
# daemon's — i.e. what actually fires.

1  = KEY_LEFTCTRL+KEY_Z              # undo
2  = KEY_LEFTCTRL+KEY_LEFTSHIFT+KEY_Z # redo
3  = KEY_LEFTCTRL+KEY_C              # copy
4  = KEY_LEFTCTRL+KEY_V              # paste
5  = KEY_LEFTCTRL+KEY_X              # cut
6  = KEY_LEFTCTRL+KEY_S              # save
7  = KEY_LEFTCTRL+KEY_A              # select all
8  = KEY_LEFTCTRL+KEY_F              # find
9  = KEY_F13
10 = KEY_F14
11 = KEY_F15
12 = KEY_F16
13 = KEY_LEFTMETA+KEY_H              # niri focus-column-left
14 = KEY_LEFTMETA+KEY_L              # niri focus-column-right
15 = KEY_LEFTMETA+KEY_I             # niri focus-workspace-up
16 = KEY_LEFTMETA+KEY_N              # niri focus-monitor-next
17 = KEY_LEFTMETA+KEY_U              # niri focus-workspace-down
18 = KEY_LEFTMETA                    # dial push -> Super (hold for Super+wheel)
19 = KEY_MUTE                        # spare (b6 bit2)

dial_cw  = KEY_VOLUMEUP
dial_ccw = KEY_VOLUMEDOWN
