# ~/.config/tmux/tmux.conf — zellij-alike, gruvbox
# Look: rounded ribbon tabs, mode block, framed panes.

# ── core ─────────────────────────────────────────────────────────────
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"      # truecolor (foot: RGB)
set -g  mouse on
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on
set -g  escape-time 10                   # snappy Alt / Esc
set -g  focus-events on
set -g  history-limit 50000
set -g  status-interval 5
setw -g mode-keys vi

# palette (gruvbox dark): bg0 #282828  bg1 #3c3836  bg2 #504945
#   fg #ebdbb2  gray #928374  green #b8bb26  orange #fe8019
# rounded powerline caps: left  U+E0B6   right  U+E0B4

# prefix extras
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display " reloaded"

# cheat sheet in a floating popup (native display-popup, q to close)
bind F1 display-popup -w 62% -h 72% -E "less -R ~/.config/tmux/cheatsheet.txt"

# ── panes: zellij frames ─────────────────────────────────────────────
set -g pane-border-lines single
set -g pane-border-style        "fg=#3c3836"
set -g pane-active-border-style "fg=#b8bb26"
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=#b8bb26#,bold],#[fg=#928374]}#P #{pane_current_command} "

# ── status: single line (session + tabs + clock) ─────────────────────
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#ebdbb2"

# left: mode block (flips NORMAL→PREFIX like a zellij mode)
set -g status-left-length 40
set -g status-left "#{?client_prefix,#[fg=#fe8019]#[bg=#fe8019#,fg=#282828#,bold] PREFIX #[fg=#fe8019#,bg=default],#[fg=#b8bb26]#[bg=#b8bb26#,fg=#282828#,bold] #S #[fg=#b8bb26#,bg=default]} "

# tabs as rounded ribbons
set -g window-status-separator " "
set -g window-status-format         "#[fg=#3c3836,bg=default]#[bg=#3c3836,fg=#928374] #I #W #[fg=#3c3836,bg=default]"
set -g window-status-current-format "#[fg=#b8bb26,bg=default]#[bg=#b8bb26,fg=#282828,bold] #I #W #[fg=#b8bb26,bg=default]"

# right: clock block
set -g status-right-length 40
set -g status-right "#[fg=#504945,bg=default]#[bg=#504945,fg=#ebdbb2] %H:%M #[fg=#504945,bg=default]"


# ── copy-mode / message accents ──────────────────────────────────────
set -g message-style      "bg=#b8bb26,fg=#282828,bold"
set -g mode-style         "bg=#504945,fg=#ebdbb2"
set -g copy-mode-match-style          "bg=#d79921,fg=#282828"
set -g copy-mode-current-match-style  "bg=#fe8019,fg=#282828"

# ── plugins ──────────────────────────────────────────────────────────
# floax: floating scratch terminal (prefix p). Manual clone, not chezmoi-tracked:
#   git clone https://github.com/omerxx/tmux-floax ~/.config/tmux/plugins/tmux-floax
set -g @floax-border-color "#b8bb26"
set -g @floax-text-color   "#ebdbb2"
run-shell ~/.config/tmux/plugins/tmux-floax/floax.tmux
